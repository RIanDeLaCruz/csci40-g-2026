{% extends 'base.html' %}

{% block body %}
  <a href="/tasks/list">Home</a>
  <h1>Task Detail</h1>
  <p>{{ task.name }}</p>
  <p>{{ task.due_date }}</p>
  {% if task.task_image %}
  <img src="{{ task.task_image.url }}" alt="">
  {% endif %}

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form }}
    <input type="submit" name="submit" value="Save Task">
  </form>
{% endblock %}
